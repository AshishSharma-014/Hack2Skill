<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Officer Login | JanAwaaz</title>
<link rel="stylesheet" href="CSS/navbar.css">
<link rel="stylesheet" href="CSS/login.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <main class="login-page">
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="grid-overlay"></div>

    <div class="login-card">
      <div class="card-glow-border"></div>

      <div class="login-header">
        <div class="lock-icon">🔒</div>
        <h1>Officer Login</h1>
        <p class="login-subtitle">Secure access for constituency officers</p>
      </div>

      <!-- STEP 1: Mobile Number -->
      <div class="step-container" id="step1">
        <div class="field-group">
          <label class="field-label" for="mobileInput">Mobile Number</label>
          <div class="input-wrapper">
            <span class="input-prefix">+91</span>
            <input
              type="tel"
              id="mobileInput"
              class="text-input"
              placeholder="Enter 10-digit number"
              maxlength="10"
              inputmode="numeric"
            >
          </div>
          <div class="input-underline"></div>
        </div>

        <button type="button" id="sendOtpBtn" class="primary-btn">
          <span class="btn-text">Send OTP</span>
        </button>
      </div>

      <!-- STEP 2: OTP Verification -->
      <div class="step-container hidden" id="step2">
        <div class="field-group">
          <label class="field-label">Enter OTP</label>
          <p class="otp-sent-text">Code sent to <span id="mobileDisplay">+91 XXXXXXXXXX</span></p>

          <div class="otp-inputs" id="otpInputs">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-box" maxlength="1" inputmode="numeric">
          </div>

          <div class="error-message" id="errorMessage">Invalid OTP. Please try again.</div>
        </div>

        <button type="button" id="verifyBtn" class="primary-btn">
          <span class="btn-text">Verify &amp; Login</span>
        </button>

        <div class="resend-row">
          <span>Didn't receive the code?</span>
          <a href="#" id="resendLink" class="resend-link">Resend OTP</a>
        </div>

        <button type="button" id="backBtn" class="back-link">← Change number</button>
      </div>

    </div>
  </main>

  <script src="Js/navbar.js"></script>
  <script src="Js/auth.js"></script>
</body>
</html>
